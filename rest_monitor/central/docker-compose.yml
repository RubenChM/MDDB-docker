# Central compose — deploy this on the central monitoring machine only.
# Prometheus receives remote_write from all nodes; Grafana reads from it.

networks:
  web_network:
    external: true

volumes:
  prometheus_data: {}
  grafana_data: {}

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-central
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.retention.size=30GB'
      # - '--storage.tsdb.wal-compression'  
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'   # accepts remote_write from nodes
      
    ports:
      - "9090:9090"
    networks:
      - web_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning  # auto-provisions the data source
    environment:
      - GF_SECURITY_ADMIN_USER=mddb
      - GF_SECURITY_ADMIN_PASSWORD=patata   # change this
      - GF_SERVER_DOMAIN=irb-dev.mddbr.eu
      - GF_SERVER_ROOT_URL=https://irb-dev.mddbr.eu/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    ports:
      - "3000:3000"
    networks:
      - web_network
    depends_on:
      - prometheus
