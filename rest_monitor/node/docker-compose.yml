# Node compose — deploy this on every monitored node.
# Prometheus scrapes local metrics and remote_writes to the central Prometheus.

networks:
  monitoring:
    driver: bridge
  web_network:
    external: true
    name: web_network

volumes:
  prometheus_node_data: {}

services:
  # node-exporter:
  #   image: prom/node-exporter:latest
  #   container_name: node-exporter
  #   restart: unless-stopped
  #   volumes:
  #     - /proc:/host/proc:ro
  #     - /sys:/host/sys:ro
  #     - /:/rootfs:ro
  #   command:
  #     - '--path.procfs=/host/proc'
  #     - '--path.rootfs=/rootfs'
  #     - '--path.sysfs=/host/sys'
  #     - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
  #   expose:
  #     - 9100
  #   networks:
  #     - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-node
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_node_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle' 
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # host 9091 forwarded to container 9090 (default Prometheus port)
      - "9091:9090"
    networks:
      - web_network

