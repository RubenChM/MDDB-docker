global:
  scrape_interval: 10m
  # Each metric series forwarded to the central Prometheus gets a label
  # identifying which node sent it.
  external_labels:
    node: 'IRB-DEV'   # <- replace with a unique name per node (e.g. node1, node2)

scrape_configs:
  - job_name: 'prometheus_node'
    scrape_interval: 10m
    static_configs:
      - targets: ['127.0.0.1:9090']

  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  
  - job_name: "rest"
    metrics_path: '/metrics'
    # Discover rest services 
    dns_sd_configs:
      - names:
          - 'tasks.my_stack_rest'
        type: 'A'
        port: 3000

  # - job_name: "rest_local"
  #   scrape_interval: 1m
  #   metrics_path: '/metrics/'
  #   static_configs:
  #     - targets: ['host.docker.internal:8000']

remote_write:
  # - url: 'http://CENTRAL_PROMETHEUS_IP:9090/api/v1/write'   # <- replace with your central machine IP
  - url: 'http://10.5.93.92:9090/api/v1/write' # IP=$(hostname -I | awk '{print $1}')


