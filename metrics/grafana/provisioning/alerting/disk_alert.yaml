apiVersion: 1
groups:
    - orgId: 1
      name: System
      folder: Alerts
      interval: 5m
      rules:
        - uid: ffjnbvwqz8mpsf
          title: Disk space
          condition: B
          data:
            - refId: C
              relativeTimeRange:
                from: 86400
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                datasource:
                    type: prometheus
                    uid: PBFA97CFB590B2093
                editorMode: code
                expr: (sum by(device) (node_filesystem_size_bytes{device="/dev/vda1"}) - (sum by(device) (node_filesystem_free_bytes))) / (sum by(device) (node_filesystem_size_bytes))
                instant: true
                interval: ""
                intervalMs: 15000
                legendFormat: '{{label}}'
                maxDataPoints: 43200
                range: false
                refId: C
            - refId: B
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0.85
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: C
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: threshold
          dashboardUid: adb962aa
          panelId: 2
          noDataState: NoData
          execErrState: Error
          for: 10m
          annotations:
            __dashboardUid__: adb962aa
            __panelId__: "2"
          labels: {}
          isPaused: false
          notification_settings:
            receiver: Rubén
