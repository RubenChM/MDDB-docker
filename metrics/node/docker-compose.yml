# Prometheus stack template.
# Set PROMETHEUS_MODE=central or PROMETHEUS_MODE=node before starting.

networks:
  metrics_network:
    external: true

services:
  # Host metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    command:
      - '--path.procfs=/host/proc' # Mapping host proc to container /host/proc
      - '--path.sysfs=/host/sys'   # Mapping host sys to container /host/sys
      - '--path.rootfs=/rootfs'    # Mapping host root to container /rootfs
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      # Disable default collectors and enable only a few
      - '--collector.disable-defaults'
      - '--collector.cpu'
      - '--collector.filesystem'
      - '--collector.meminfo'
    pid: host
    network_mode: host
  
  # Container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      # https://github.com/google/cadvisor/blob/master/docs/runtime_options.md
      - '--enable_metrics=cpu,disk,memory'
      - '--housekeeping_interval=10s'
      - '--docker_only'
      - '--store_container_labels=false'
    networks:
      - metrics_network

  # Prometheus mode is selected at runtime with PROMETHEUS_MODE.
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus-central.yml:/etc/prometheus/prometheus-central.yml:ro
      - ./prometheus-node.yml:/etc/prometheus/prometheus-node.yml:ro
    environment:
      - PROMETHEUS_MODE=${PROMETHEUS_MODE:-node}
    command:
      # Use a shell command to select the config file based on PROMETHEUS_MODE
      - /bin/sh
      - -ec
      - |
        set -eu
        case "${PROMETHEUS_MODE:-node}" in
          central)
            CONFIG_FILE=/etc/prometheus/prometheus-central.yml
            EXTRA_FLAGS="--web.enable-remote-write-receiver"
            ;;
          node)
            CONFIG_FILE=/etc/prometheus/prometheus-node.yml
            EXTRA_FLAGS=""
            ;;
          *)
            echo "Invalid PROMETHEUS_MODE: ${PROMETHEUS_MODE:-}" >&2
            exit 1
            ;;
        esac
        exec /bin/prometheus \
          --config.file="$CONFIG_FILE" \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.size=1GB \
          --storage.tsdb.retention.time=24h \
          --web.console.libraries=/etc/prometheus/console_libraries \
          --web.console.templates=/etc/prometheus/consoles \
          --web.enable-lifecycle \
          $EXTRA_FLAGS
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # host 9090 forwarded to container 9090 (default Prometheus port)
      - "9090:9090"
    networks:
      - metrics_network
