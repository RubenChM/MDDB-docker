global:
  scrape_interval: 1m
  external_labels:
    node: 'IRB-DEV'   # <- replace with a unique name per node

scrape_configs:
  # Scrape the state of Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['127.0.0.1:9090']

  # Scrape Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Scrape the resources of the machine
  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
  
  # Scrape cAdvisor for container metrics (https://github.com/google/cadvisor/blob/master/docs/storage/prometheus.md)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']


# All node metrics arrive via remote_write — no scrape jobs needed for nodes.
# The 'node' label added by each node's external_labels lets you filter per machine.
