      # Update GHCR README from ghcr-readme.md
      - name: Update GHCR README
        uses: peter-evans/ghcr-description@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          container: ${{ env.IMAGE_NAME }}
          readme-file: ./workflow/README.md
