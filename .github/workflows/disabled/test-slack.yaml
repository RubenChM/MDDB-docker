name: Test Slack Notification

on:
  push:
    branches: [ main ]

jobs:
  notify-slack:
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack notification
        run: |
          STATUS=${{ job.status }}
          MESSAGE="Workflow *${{ github.workflow }}* in repo *${{ github.repository }}* completed with status: ${STATUS}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${MESSAGE}\"}" \
            "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
